<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Unseen Path</title>
  <style>
    body { background: #0d0d0d; color: #c0c0c0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { border: 1px solid #333; padding: 2rem; width: 320px; }
    h1 { color: #00ff99; font-size: 1.2rem; margin-bottom: 1.5rem; }
    input { width: 100%; padding: 0.5rem; margin: 0.4rem 0 1rem; background: #1a1a1a; border: 1px solid #444; color: #eee; box-sizing: border-box; }
    button { width: 100%; padding: 0.6rem; background: #00ff99; color: #000; border: none; cursor: pointer; font-weight: bold; }
    .error { color: #ff4444; font-size: 0.85rem; margin-top: 0.5rem; }
    .hint { color: #555; font-size: 0.7rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="box">
    <h1>// THE UNSEEN PATH</h1>
    <form method="POST" action="/login">
      <label>Username</label>
      <input type="text" name="username" autocomplete="off" />
      <label>Password</label>
      <input type="password" name="password" />
      <button type="submit">ENTER</button>
    </form>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <div class="hint"><!-- not all paths are visible. check /static/verify.js --></div>
  </div>
  <script src="/static/verify.js"></script>
</body>
</html>
